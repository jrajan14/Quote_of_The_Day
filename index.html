<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ethereal Quotes | Quote of the Day</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- floating magical orbs / flying objects canvas -->
    <canvas id="floatingCanvas"></canvas>

    <div class="glass-container">
        <div class="badge">✦ inspiration daily ✦</div>
        <h1 class="main-title">Quote of the day</h1>
        
        <div class="quote-card">
            <div class="quote-icon">“</div>
            <p id="quoteText" class="quote-text">Loading wisdom...</p>
            <p id="quoteAuthor" class="quote-author">— The universe</p>
            <div class="quote-decoration">”</div>
        </div>

        <button id="newQuoteBtn" class="crystal-btn">
            <span class="btn-text">⟳ New wisdom</span>
            <span class="btn-glow"></span>
        </button>

        <div class="footer-note">︵‿︵ each day, a new spark ︵‿︵</div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
